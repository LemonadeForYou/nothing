    .btn-bypass {

      border-radius: 1.5rem;
      padding: 0.75rem 1.5rem;

      font-size: 0.95rem;
      color: white;
      transition: all 0.2s;

    .copy-badge {

      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;

    .copy-badge:hover {

    .discord-footer {

    .discord-footer:hover {

    .form-label {

    @media (max-width: 640px) {

      .shield-icon { width: 70px; height: 70px; border-radius: 24px; }
      .shield-icon svg { width: 36px; height: 36px; }
    }

<script>
  (function() {
    const linkTypeSelect = document.getElementById('linkTypeSelect');
    const linkInput = document.getElementById('linkInput');
    const generateBtn = document.getElementById('generateBtn');
    const resultContainer = document.getElementById('resultContainer');
    const generatedLinkSpan = document.getElementById('generatedLink');
    const copyBtn = document.getElementById('copyBtn');

    let currentMaskedUrl = '';

    function normalizeUrl(raw) {
      let url = raw.trim();
      if (!url) return '';
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      return url;
    }

    function getDisplayTextForType(linkTypeValue) {
      if (linkTypeValue === 'profile') return '👤 Roblox Profile';
      if (linkTypeValue === 'private') return '🔒 Private Server Invite';
      if (linkTypeValue === 'group') return '👥 Roblox Group';
      return '🔗 Hyperlink';
    }

    function generateMaskedLink(originalUrl, linkTypeValue) {
      if (!originalUrl) return '';
      const displayText = getDisplayTextForType(linkTypeValue);
      return `[${displayText}](${originalUrl})`;
    }

    function updateResult(link) {
      if (link && link.trim() !== '') {
        generatedLinkSpan.innerText = link;
        resultContainer.style.display = 'block';
        currentMaskedUrl = link;
      } else {
        resultContainer.style.display = 'none';
        currentMaskedUrl = '';
      }
    }

    function handleGenerate() {
      let rawLink = linkInput.value;
      if (!rawLink.trim()) {
        generatedLinkSpan.innerText = '⚠️ Please enter a valid Roblox link';
        resultContainer.style.display = 'block';
        currentMaskedUrl = '';
        setTimeout(() => {
          if (generatedLinkSpan.innerText.includes('⚠️')) resultContainer.style.display = 'none';
        }, 2000);
        return;
      }
      const normalized = normalizeUrl(rawLink);
      const selectedType = linkTypeSelect.value;
      const masked = generateMaskedLink(normalized, selectedType);
      updateResult(masked);
    }

    generateBtn.addEventListener('click', handleGenerate);

    copyBtn.addEventListener('click', async () => {
      let textToCopy = currentMaskedUrl;
      if (!textToCopy) {
        const fallback = generatedLinkSpan.innerText;
        if (!fallback || fallback.includes('⚠️')) return;
        textToCopy = fallback;
      }
      try {
        await navigator.clipboard.writeText(textToCopy);
        const originalHtml = copyBtn.innerHTML;
        copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
        setTimeout(() => {
          copyBtn.innerHTML = originalHtml;
        }, 1500);
      } catch (err) {
        console.warn('Copy error');
      }
    });
  })();
</script>
